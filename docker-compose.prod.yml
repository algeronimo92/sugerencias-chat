services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
