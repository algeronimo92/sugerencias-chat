name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m compileall -q .
      # Smoke test: la app tiene que poder importarse sin tocar una DB o n8n real.
      - run: |
          DATABASE_URL="postgresql+asyncpg://u:p@localhost/db" \
          N8N_WEBHOOK_URL="https://example.com/webhook/x" \
          SECRET_KEY="ci-smoke-test-key" \
          python -c "import main"

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t backend-check ./backend
      - name: Build frontend image (prod target)
        run: docker build -t frontend-check --target prod --build-arg VITE_API_BASE_URL="" ./frontend
      # nginx.conf tiene "proxy_pass http://backend:8000;" — nginx resuelve ese
      # hostname ya al cargar la config, así que validarlo aislado (sin un
      # contenedor "backend" real en la misma red) siempre falla con "host
      # not found in upstream", sin que eso diga nada sobre si el config
      # está bien. Se arma la misma topología que docker-compose en prod:
      # una red con un "backend" de mentira, y ahí sí se valida.
      - name: Verify nginx.conf against a real "backend" hostname
        run: |
          docker network create ci-net
          docker run -d --name backend --network ci-net python:3.12-slim python -m http.server 8000
          docker run -d --name frontend --network ci-net frontend-check
          sleep 2
          docker exec frontend nginx -t
          docker ps --filter name=frontend --filter status=running --format '{{.Names}}' | grep -qx frontend
      - name: Cleanup check containers
        if: always()
        run: |
          docker rm -f backend frontend 2>/dev/null || true
          docker network rm ci-net 2>/dev/null || true

  deploy:
    needs: [frontend-checks, backend-checks, docker-build-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml -f traefik/docker-compose.yml up -d --build
            docker image prune -f
