services:
  backend:
    build:
      context: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:5174","http://localhost:3000"]
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5174:5173"
    depends_on:
      - backend
